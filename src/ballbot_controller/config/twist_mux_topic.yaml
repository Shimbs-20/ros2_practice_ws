twist_mux:
  ros__parameters:
    topics:
      navigation:
        topic: /cmd_vel_nav
        timeout: 0.5
        priority: 10
      keyboard:
        topic: /cmd_vel_key
        timeout: 0.5
        priority: 50
      joystick:
        # BUG FIX: was /cmd_vel_joy but joy_teleop publishes to
        # /input_joy/cmd_vel (unstamped) after twist_relay strips the stamp.
        # twist_mux only handles geometry_msgs/Twist (unstamped), so we feed
        # it the unstamped topic that twist_relay re-publishes.
        topic: /input_joy/cmd_vel
        timeout: 0.5
        priority: 100
 