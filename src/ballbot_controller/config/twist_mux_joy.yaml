# Correct structure:
twist_mux:
  ros__parameters:
    joy_turbo:
      increase_topic: /joy_turbo_increase   # matches action server name
      decrease_topic: /joy_turbo_decrease   # matches action server name
      steps: 3                              # number of speed levels
      turbo_topics:
        - /input_joy/cmd_vel               # which topics get scaled
      linear:
        forward:
          min: 0.2
          max: 0.7
        backward:
          min: 0.2
          max: 0.7
      angular:
        min: 0.7
        max: 2.0