joy_teleop:
  ros__parameters:
    move:
      type: topic
      interface: "geometry_msgs/msg/Twist"
      topic: "/ballbot_controller/cmd_vel_unstamped"

      deadman_buttons: [5]

      axis_mappings:
        linear-x:
          axis: 1
          scale: 1.0
          offset: 0.0
        angular-z:
          axis: 3
          scale: 8.0
          offset: 0.0