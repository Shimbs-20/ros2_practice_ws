joy_teleop_node:
  ros__parameters:
    move:
      type: topic
      interface: "geometry_msgs/msg/TwistStamped"
      topic: "/input_joy/cmd_vel_stamped"

      deadman_buttons: [5]

      axis_mappings:
        linear-x:
          axis: 1
          scale: 1.0
          offset: 0.0
        angular-z:
          axis: 3
          scale: 1.0
          offset: 0.0